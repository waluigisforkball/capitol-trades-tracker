<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capitol Trades Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .heatmap-low { background-color: rgba(250, 204, 21, 0.2); }
    .heatmap-med { background-color: rgba(251, 146, 60, 0.3); }
    .heatmap-high { background-color: rgba(239, 68, 68, 0.4); }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-50">
  <div class="min-h-screen">
    <!-- Header -->
    <div class="border-b border-slate-700 bg-slate-900/50 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-6 py-6">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">
              Capitol Trades
            </h1>
            <p class="text-slate-400 text-sm mt-1">Real-time political trading tracker</p>
          </div>
          <div id="lastUpdated" class="text-right text-sm text-slate-400"></div>
        </div>
        
        <div class="relative">
          <input 
            type="text" 
            id="searchInput"
            placeholder="Search politician or ticker..."
            class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-50 placeholder-slate-500 focus:outline-none focus:border-blue-500"
          >
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-6 py-8">
      <div id="loading" class="text-center py-12">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-400"></div>
        <p class="text-slate-400 mt-4">Loading trades...</p>
      </div>

      <div id="content" class="hidden">
        <!-- Trades List -->
        <div id="tradesList" class="space-y-4"></div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden bg-slate-800 border border-slate-700 rounded-xl p-8 text-center">
          <p class="text-slate-400">No trades found</p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="border-t border-slate-700 bg-slate-900/50 mt-12">
      <div class="max-w-7xl mx-auto px-6 py-6 text-center text-slate-500 text-sm">
        <p>Data sourced from Politician Trade Tracker API. Updated nightly.</p>
      </div>
    </div>
  </div>

  <script>
    let allTrades = [];

    // Heat map color based on portfolio %
    function getHeatmapClass(percent) {
      const p = parseFloat(percent);
      if (p < 1) return 'heatmap-low';
      if (p < 3) return 'heatmap-med';
      return 'heatmap-high';
    }

    function getBadgeColor(type) {
      return type === 'BUY' 
        ? 'bg-green-500/20 text-green-300' 
        : 'bg-red-500/20 text-red-300';
    }

    function renderTrades(trades) {
      const container = document.getElementById('tradesList');
      const emptyState = document.getElementById('emptyState');
      
      if (trades.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      container.innerHTML = trades.map((trade, idx) => `
        <div class="border border-slate-700 rounded-xl p-5 ${getHeatmapClass(trade.portfolioPercent)} hover:border-slate-500 transition-all">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-4">
              <div>
                <p class="font-semibold text-slate-100">${trade.politician}</p>
                <p class="text-xs text-slate-500">${trade.state || 'N/A'}</p>
              </div>
              <div class="text-2xl font-bold text-slate-100">${trade.ticker}</div>
              <div class="px-3 py-1 rounded-full text-sm font-semibold ${getBadgeColor(trade.type)}">
                ${trade.type}
              </div>
            </div>
            <div class="text-right">
              <p class="text-2xl font-bold text-slate-100">${trade.portfolioPercent}%</p>
              <p class="text-xs text-slate-500">of portfolio</p>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4 text-sm mb-3">
            <div>
              <p class="text-slate-500 text-xs">Amount</p>
              <p class="text-slate-100 font-mono">${trade.amount}</p>
            </div>
            <div>
              <p class="text-slate-500 text-xs">Price</p>
              <p class="text-slate-100 font-mono">${trade.currentPrice ? '$' + trade.currentPrice.toFixed(2) : '—'}</p>
            </div>
            <div>
              <p class="text-slate-500 text-xs">Trade Date</p>
              <p class="text-slate-100 font-mono">${trade.tradeDate}</p>
            </div>
            <div>
              <p class="text-slate-500 text-xs">Filed</p>
              <p class="text-slate-100 font-mono">${trade.filingDate}</p>
            </div>
          </div>

          <a href="${trade.secLink}" target="_blank" class="text-xs text-blue-400 hover:text-blue-300 underline">
            View SEC Filing →
          </a>
        </div>
      `).join('');
    }

    function filterTrades(searchTerm) {
      if (!searchTerm.trim()) {
        renderTrades(allTrades);
        return;
      }

      const term = searchTerm.toLowerCase();
      const filtered = allTrades.filter(t => 
        t.politician.toLowerCase().includes(term) ||
        t.ticker.toLowerCase().includes(term)
      );
      renderTrades(filtered);
    }

    async function loadData() {
      try {
        const response = await fetch('./trades-data.json');
        const data = await response.json();
        allTrades = (data.trades || []).sort((a, b) => new Date(b.tradeDate) - new Date(a.tradeDate));
        
        if (data.lastUpdated) {
          document.getElementById('lastUpdated').innerHTML = `
            <p>Last synced:</p>
            <p class="text-xs text-slate-400">${new Date(data.lastUpdated).toLocaleString()}</p>
          `;
        }

        renderTrades(allTrades);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
      } catch (e) {
        console.error('Failed to load trades:', e);
        document.getElementById('loading').innerHTML = `
          <p class="text-red-400">Failed to load trades data</p>
          <p class="text-slate-500 text-sm mt-2">Make sure trades-data.json exists in the repo</p>
        `;
      }
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      filterTrades(e.target.value);
    });

    // Load on page load
    loadData();
  </script>
</body>
</html>
